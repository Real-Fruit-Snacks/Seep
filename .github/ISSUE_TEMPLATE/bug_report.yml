name: Bug Report
description: Report a bug in Seep
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Seep Version
      description: "Output of `seep --version` or the release tag"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Platform
      description: "Operating system and architecture (attack box and/or target)"
      placeholder: "Kali 2024.4 x86_64 / Windows 11 target"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which component is affected?"
      options:
        - Server (CLI / HTTP)
        - Agent (PowerShell checks)
        - Catalog (tool management)
        - Reports (HTML / Markdown / JSON)
        - Composer (agent assembly)
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Provide the exact steps to reproduce the bug"
      placeholder: |
        1. Run `seep serve --workdir /tmp/op1`
        2. Execute agent on target
        3. Observe error in output
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: "Paste any relevant logs, error messages, or terminal output"
      render: shell
    validations:
      required: false
