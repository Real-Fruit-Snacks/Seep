<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" fill="#11111b" rx="8"/>

  <!-- Hexagonal Frame -->
  <g transform="translate(100, 110)" filter="url(#softGlow)">
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="2" fill="#94e2d5" opacity="0.6"/>
    <!-- Entry node (left) -->
    <circle cx="-62.4" cy="0" r="2" fill="#94e2d5" opacity="0.5"/>
    <!-- Exit node (right) -->
    <circle cx="62.4" cy="0" r="2" fill="#94e2d5" opacity="0.5"/>

    <!-- Particle dots on hex edges -->
    <circle cx="31.2" cy="-54" r="1.2" fill="#a6e3a1" opacity="0.35"/>
    <circle cx="-31.2" cy="-54" r="1.2" fill="#94e2d5" opacity="0.3"/>
    <circle cx="31.2" cy="54" r="1.2" fill="#a6e3a1" opacity="0.3"/>
    <circle cx="-31.2" cy="54" r="1.2" fill="#94e2d5" opacity="0.35"/>
    <circle cx="-55" cy="-18" r="1" fill="#a6e3a1" opacity="0.25"/>
    <circle cx="55" cy="18" r="1" fill="#94e2d5" opacity="0.25"/>

    <!-- LOGOMARK: Seeping Through Layers -->
    <!-- Barrier layer 1 — top -->
    <line x1="-32" y1="-26" x2="-6" y2="-26" stroke="#94e2d5" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <line x1="2" y1="-26" x2="32" y2="-26" stroke="#94e2d5" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <!-- Gap at x=-2 to x=2 -->

    <!-- Barrier layer 2 — middle -->
    <line x1="-30" y1="-4" x2="-14" y2="-4" stroke="url(#accentGrad)" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
    <line x1="-6" y1="-4" x2="12" y2="-4" stroke="url(#accentGrad)" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
    <line x1="20" y1="-4" x2="30" y2="-4" stroke="url(#accentGrad)" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
    <!-- Gaps at x=-10 and x=16 -->

    <!-- Barrier layer 3 — bottom -->
    <line x1="-28" y1="18" x2="6" y2="18" stroke="#a6e3a1" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="14" y1="18" x2="28" y2="18" stroke="#a6e3a1" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <!-- Gap at x=10 -->

    <!-- Fluid path zigzagging through gaps -->
    <path d="M -2,-38 L -2,-26 L -10,-4 L 16,-4 L 10,18 L 10,34"
          fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

    <!-- Droplets collecting at bottom -->
    <circle cx="10" cy="38" r="2.5" fill="#a6e3a1" opacity="0.6"/>
    <circle cx="4" cy="44" r="1.8" fill="#94e2d5" opacity="0.5"/>
    <circle cx="16" cy="42" r="1.5" fill="#a6e3a1" opacity="0.45"/>

    <!-- Small seep drops along path -->
    <circle cx="-2" cy="-32" r="1.2" fill="#94e2d5" opacity="0.55"/>
    <circle cx="-6" cy="-15" r="1" fill="#a6e3a1" opacity="0.4"/>
    <circle cx="3" cy="-15" r="0.9" fill="#94e2d5" opacity="0.35"/>
    <circle cx="13" cy="7" r="1" fill="#a6e3a1" opacity="0.4"/>

    <!-- Crack texture on barriers -->
    <line x1="-2" y1="-28" x2="-2" y2="-24" stroke="#94e2d5" stroke-width="0.4" opacity="0.3"/>
    <line x1="-10" y1="-6" x2="-10" y2="-2" stroke="#a6e3a1" stroke-width="0.4" opacity="0.25"/>
    <line x1="16" y1="-6" x2="16" y2="-2" stroke="#94e2d5" stroke-width="0.4" opacity="0.25"/>
    <line x1="10" y1="16" x2="10" y2="20" stroke="#a6e3a1" stroke-width="0.4" opacity="0.25"/>
  </g>

  <!-- Typography -->
  <g transform="translate(200, 0)">
    <!-- Project Name -->
    <text x="0" y="92" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="82" font-weight="800" fill="url(#textGrad)" letter-spacing="3">SEEP</text>

    <!-- Separator line -->
    <line x1="0" y1="108" x2="300" y2="108" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="132" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="11.5" fill="#cdd6f4" letter-spacing="2" opacity="0.85">WINDOWS PRIVESC ENUMERATION</text>

    <!-- Descriptor -->
    <text x="0" y="152" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="9" fill="#a6adc8" letter-spacing="2.5" opacity="0.6">PYTHON · 16 CHECKS · 97 TOOLS · ATT&amp;CK</text>
  </g>
</svg>