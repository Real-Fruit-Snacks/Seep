<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11111b"/>
      <stop offset="50%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>
    <linearGradient id="seep-flow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5" stop-opacity="0"/>
      <stop offset="20%" stop-color="#94e2d5"/>
      <stop offset="80%" stop-color="#a6e3a1"/>
      <stop offset="100%" stop-color="#a6e3a1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>
  <rect width="800" height="280" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- ===== LOGOMARK — Seeping Through Layers (left of title) ===== -->
  <g transform="translate(258, 32) scale(0.85)">
    <!-- Layer 1 — top barrier -->
    <rect x="12" y="24" width="32" height="2" rx="1" fill="#585b70"/>
    <rect x="52" y="24" width="56" height="2" rx="1" fill="#585b70"/>
    <!-- Layer 2 — middle barrier -->
    <rect x="12" y="52" width="50" height="2" rx="1" fill="#585b70"/>
    <rect x="70" y="52" width="38" height="2" rx="1" fill="#585b70"/>
    <!-- Layer 3 — bottom barrier -->
    <rect x="12" y="80" width="22" height="2" rx="1" fill="#585b70"/>
    <rect x="42" y="80" width="66" height="2" rx="1" fill="#585b70"/>
    <!-- Entry point -->
    <circle cx="48" cy="14" r="3" fill="#94e2d5"/>
    <!-- Fluid path -->
    <path d="M48,17 L48,24 L48,26 L66,26 L66,52 L66,54 L38,54 L38,80 L38,82 L38,96"
          stroke="url(#seep-flow)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Droplets -->
    <circle cx="30" cy="100" r="2" fill="#a6e3a1"/>
    <circle cx="38" cy="104" r="2" fill="#a6e3a1"/>
    <circle cx="46" cy="101" r="2" fill="#a6e3a1"/>
    <circle cx="54" cy="106" r="2" fill="#a6e3a1"/>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="468" y="108" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="82" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="14" filter="url(#glow)">SEEP</text>

  <!-- Accent line -->
  <rect x="220" y="126" width="360" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Tagline -->
  <text x="400" y="158" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="12" fill="#a6adc8" text-anchor="middle"
        letter-spacing="4">WINDOWS PRIVESC ENUMERATION</text>

  <!-- Feature pills -->
  <g transform="translate(88, 182)">
    <!-- Pill: PYTHON -->
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#313244"/>
    <rect x="0" y="0" width="100" height="26" rx="13" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="16" cy="13" r="3.5" fill="#94e2d5"/>
    <text x="28" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="10" fill="#cdd6f4" letter-spacing="1">PYTHON</text>

    <!-- Pill: 16 CHECKS -->
    <rect x="118" y="0" width="120" height="26" rx="13" fill="#313244"/>
    <rect x="118" y="0" width="120" height="26" rx="13" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="134" cy="13" r="3.5" fill="#a6e3a1"/>
    <text x="146" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="10" fill="#cdd6f4" letter-spacing="1">16 CHECKS</text>

    <!-- Pill: 97 TOOLS -->
    <rect x="256" y="0" width="112" height="26" rx="13" fill="#313244"/>
    <rect x="256" y="0" width="112" height="26" rx="13" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="272" cy="13" r="3.5" fill="#94e2d5"/>
    <text x="284" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="10" fill="#cdd6f4" letter-spacing="1">97 TOOLS</text>

    <!-- Pill: ATT&CK -->
    <rect x="386" y="0" width="108" height="26" rx="13" fill="#313244"/>
    <rect x="386" y="0" width="108" height="26" rx="13" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="402" cy="13" r="3.5" fill="#a6e3a1"/>
    <text x="414" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="10" fill="#cdd6f4" letter-spacing="1">ATT&amp;CK</text>

    <!-- Pill: FILELESS -->
    <rect x="512" y="0" width="112" height="26" rx="13" fill="#313244"/>
    <rect x="512" y="0" width="112" height="26" rx="13" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="528" cy="13" r="3.5" fill="#94e2d5"/>
    <text x="540" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="10" fill="#cdd6f4" letter-spacing="1">FILELESS</text>
  </g>

  <!-- Bottom tech line -->
  <text x="400" y="238" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="10" fill="#6c7086" text-anchor="middle"
        letter-spacing="3">PYTHON &middot; 16 CHECKS &middot; 97 TOOLS &middot; ATT&amp;CK</text>

  <!-- Decorative particles — top right -->
  <g opacity="0.06">
    <circle cx="700" cy="40" r="1.5" fill="#94e2d5"/>
    <circle cx="720" cy="34" r="1" fill="#a6e3a1"/>
    <circle cx="740" cy="44" r="1.5" fill="#94e2d5"/>
    <circle cx="715" cy="52" r="1" fill="#a6e3a1"/>
    <circle cx="735" cy="28" r="1" fill="#94e2d5"/>
    <circle cx="755" cy="38" r="1" fill="#a6e3a1"/>
  </g>

  <!-- Decorative particles — bottom left -->
  <g opacity="0.06">
    <circle cx="60" cy="230" r="1.5" fill="#a6e3a1"/>
    <circle cx="75" cy="240" r="1" fill="#94e2d5"/>
    <circle cx="45" cy="245" r="1.5" fill="#a6e3a1"/>
    <circle cx="80" cy="250" r="1" fill="#94e2d5"/>
  </g>
</svg>
